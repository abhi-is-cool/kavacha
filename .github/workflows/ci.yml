# Kavacha CI — validation on every push, full browser builds on demand/tags.
#
# Full Firefox builds take 1-3 hours and exceed free-runner practicality, so the
# pipeline is split:
#   - validate: fast checks on every push/PR (JSON schemas, shellcheck, patch dry-run)
#   - nightly-build: the real per-platform browser build, manual or scheduled,
#     matching the Master Plan pipeline: push -> build -> test -> installer -> artifact

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      full_build:
        description: "Run full browser builds (1-3h per platform)"
        type: boolean
        default: false
  schedule:
    - cron: "0 8 * * *" # daily Nightly, 08:00 UTC

jobs:
  validate:
    name: Validate (fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files parse
        run: |
          set -e
          find . -name '*.json' -not -path './browser/zen-upstream/*' -not -path './node_modules/*' | while read -r f; do
            python3 -m json.tool "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
          done

      - name: Validate example documents against schemas
        run: |
          pip install --quiet jsonschema
          python3 - <<'EOF'
          import json, pathlib
          from jsonschema import validate
          def load(p): return json.loads(pathlib.Path(p).read_text())
          validate(load("customization/layout-engine/default-layout.json"),
                   load("customization/layout-engine/layout.schema.json"))
          validate(load("customization/themes/kavacha-midnight/manifest.json"),
                   load("customization/themes/theme-manifest.schema.json"))
          print("schema validation OK")
          EOF

      - name: Shellcheck build scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck build/*.sh

      - name: Kavacha patches apply cleanly to upstream
        run: |
          shopt -s nullglob
          patches=(browser/patches/*.patch)
          if [ ${#patches[@]} -eq 0 ]; then echo "no patches yet"; exit 0; fi
          git clone --depth 10 https://github.com/zen-browser/desktop.git /tmp/zen
          # Patches are ordered and may build on each other (e.g. 0001 and 0002
          # both touch surfer.json), so apply each one for real, in sequence.
          for p in "${patches[@]}"; do
            echo "applying $p"
            git -C /tmp/zen apply "$GITHUB_WORKSPACE/$p"
          done

  nightly-build:
    name: Nightly build (${{ matrix.os }})
    # Full builds only on schedule or when explicitly requested.
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_build)
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          # Windows is experimental: even Zen cross-compiles its Windows
          # releases from Linux rather than building natively. Don't let it
          # fail the run while we iterate on native-build support.
          - os: windows-latest
            platform: windows
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    # Cold builds on 3-4 core hosted runners take ~4h; 360 is GitHub's job max.
    timeout-minutes: 360
    env:
      # Zen's configs/common/mozconfig turns this into --with-ccache=sccache +
      # RUSTC_WRAPPER=sccache, so compiles hit the GitHub Actions cache backend.
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Stock ubuntu runners don't have the ~40GB a Firefox build needs; the
      # runner gets killed mid-compile ("shutdown signal") when disk fills.
      # Same mitigation as Zen's linux-release-build workflow.
      - name: Free disk space (Linux)
        if: matrix.platform == 'linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - name: Install Rust
        run: rustup update stable

      # Persistent compile cache across nightlies (same recipe as Zen's release
      # workflows). The first cold build populates it; later builds should drop
      # from ~4h to well under an hour on cache hits. Caveat: GitHub caps the
      # repo cache at 10GB LRU, shared across platforms — partial hits expected.
      # continue-on-error: the action's post-run stats step can fail (seen on
      # macOS even after a fully successful build+upload) and must not poison
      # the job result.
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Expose actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'])
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'])
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])

      # surfer import commits into the Firefox tree; icon rendering needs an
      # image resizer on non-macOS hosts (see render_png in generate-branding.sh).
      - name: Configure git identity + icon tooling
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          pip install --quiet pillow
        shell: bash

      # Firefox's tree exceeds MAX_PATH, and mach needs the MozillaBuild shell.
      - name: Windows build prerequisites
        if: matrix.platform == 'windows'
        run: |
          git config --global core.longpaths true
          git config --global core.safecrlf false
          (New-Object System.Net.WebClient).DownloadFile("https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe", "C:\MozillaBuildSetup-Latest.exe")
          C:\MozillaBuildSetup-Latest.exe /S | out-null
        shell: pwsh

      - name: Bootstrap (fetch upstream + Firefox source)
        run: ./build/bootstrap.sh
        shell: bash

      # 16GB hosted runners can't take Firefox's default build parallelism:
      # Linux runners die with a "shutdown signal" (OOM kills the runner agent,
      # twice, even with disk freed) and Windows rustc hits LLVM out-of-memory
      # even at -j2 — a single rustc with full debuginfo is too big, so
      # Windows also drops debug symbols. Uses surfer's uncommitted
      # root-mozconfig hook. Slower, but these runs must finish.
      # Linux at -j3 still lost its runner ~92 min in (hard kill, no logs) —
      # the link-stage memory spike. Same fix that saved Windows: no debug
      # symbols, and -j2 for headroom.
      - name: Cap build parallelism + drop debug symbols (Linux)
        if: matrix.platform == 'linux'
        run: |
          echo 'mk_add_options MOZ_MAKE_FLAGS="-j2"' >> browser/zen-upstream/mozconfig
          echo 'ac_add_options --disable-debug-symbols' >> browser/zen-upstream/mozconfig
        shell: bash

      # Windows compiles for hours then dies linking xul.dll: "No rule to
      # make target ...goog_cc_scream...Unified_cpp_etwork_controller_gn0.obj".
      # NOT path length (macOS generates the identical unified name and links
      # fine) — an upstream inconsistency in Zen's native-Windows libwebrtc
      # build config, which tracks: Zen cross-compiles its Windows releases
      # from Linux and doesn't maintain the native path. Real fix later:
      # adopt Zen's win-cross recipe. The short-path junction stays (harmless,
      # avoids other MAX_PATH edges).
      - name: Cap build parallelism + drop debug symbols (Windows)
        if: matrix.platform == 'windows'
        run: |
          echo 'mk_add_options MOZ_MAKE_FLAGS="-j2"' >> browser/zen-upstream/mozconfig
          echo 'ac_add_options --disable-debug-symbols' >> browser/zen-upstream/mozconfig
        shell: bash

      - name: Short-path junction (Windows)
        if: matrix.platform == 'windows'
        run: New-Item -ItemType Junction -Path C:\k -Target $env:GITHUB_WORKSPACE
        shell: pwsh

      - name: Build
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then cd /c/k; fi
          ./build/bootstrap.sh build
        shell: bash

      # Compilation lands in the obj dir; `surfer package` is what produces the
      # distributables (DMG / tar / installer + update MAR) in zen-upstream/dist/.
      - name: Package
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then cd /c/k; fi
          ./build/bootstrap.sh package
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kavacha-nightly-${{ matrix.platform }}
          path: |
            browser/zen-upstream/dist/*
          if-no-files-found: error
          retention-days: 14

  # Rolling "nightly" prerelease: Actions artifacts require a GitHub login to
  # download, a Release gives a public link anyone can try. The tag is moved
  # to the built commit each publish.
  publish-nightly:
    name: Publish nightly release
    needs: nightly-build
    # always(): publish whatever platforms succeeded even if one failed
    # (Windows is experimental and continue-on-error already).
    if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_build))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release files
        run: |
          set -e
          mkdir -p out
          shopt -s nullglob
          for f in artifacts/kavacha-nightly-macos/*.dmg; do
            cp "$f" "out/kavacha-nightly-macos-arm64.dmg"
          done
          for f in artifacts/kavacha-nightly-linux/*.tar.*; do
            ext="${f#*.tar.}"
            cp "$f" "out/kavacha-nightly-linux-x86_64.tar.${ext}"
          done
          for f in artifacts/kavacha-nightly-windows/*.exe artifacts/kavacha-nightly-windows/*.zip; do
            cp "$f" "out/kavacha-nightly-windows-$(basename "$f")"
          done
          ls -la out
          [ -n "$(ls -A out)" ] || { echo "no release files found"; exit 1; }

      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          NOTES="Automated Kavacha nightly from commit ${GITHUB_SHA:0:7} ($(date -u +%Y-%m-%d)).

          Unsigned development builds — macOS: right-click the app and choose Open the first time, or run: xattr -dr com.apple.quarantine /Applications/Kavacha.app

          Not audited yet; see the roadmap for release gates."
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly out/* \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Kavacha Nightly ($(date -u +%Y-%m-%d))" \
            --notes "$NOTES"

  # TODO (before Developer Preview): code signing + notarization, reproducible-build
  # verification, dependency audit gates (cargo audit / npm audit), network-silence
  # privacy test on the built binary. Tracked in documentation/ROADMAP.md.
